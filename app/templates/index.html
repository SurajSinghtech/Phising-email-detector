<!DOCTYPE html>
<html>
<head>
<title>SOC Email Threat Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#020617;
    color:white;
}

/* Navbar */
.navbar{
    background:#020617;
    padding:18px 40px;
    border-bottom:1px solid #22d3ee;
    color:#22d3ee;
    font-size:20px;
    font-weight:bold;
    letter-spacing:1px;
}

/* Layout */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:90vh;
}

/* Dashboard Card */
.card{
    background:#020617;
    padding:45px;
    width:520px;
    border-radius:14px;
    border:1px solid #22d3ee;
    box-shadow:0 0 35px rgba(34,211,238,0.2);
    text-align:center;
}

/* Input */
input{
    width:100%;
    padding:15px;
    border-radius:8px;
    border:1px solid #334155;
    background:#020617;
    color:white;
    font-size:16px;
    outline:none;
}

input:focus{
    border-color:#22d3ee;
    box-shadow:0 0 10px #22d3ee;
}

/* Button */
button{
    margin-top:20px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:8px;
    background:#22d3ee;
    color:black;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#06b6d4;
}

/* Scan Animation */
.scan{
    margin-top:18px;
    color:#22d3ee;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{opacity:0.4;}
}

/* Result Panel */
.result{
    margin-top:25px;
    font-size:22px;
    font-weight:bold;
    padding:15px;
    border-radius:8px;
}

.phishing{
    color:#ef4444;
    border:1px solid #ef4444;
    box-shadow:0 0 20px rgba(239,68,68,0.6);
}

.legit{
    color:#22c55e;
    border:1px solid #22c55e;
    box-shadow:0 0 20px rgba(34,197,94,0.6);
}

/* Status Text */
.status{
    margin-bottom:20px;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="navbar">
🛡️ SOC Analyst Threat Intelligence Dashboard
</div>

<div class="container">

<div class="card">

<div class="status">Threat Analysis Module Active</div>

<form action="/predict" method="post" onsubmit="showScan()">
<input type="text" name="email" placeholder="Enter email address to scan..." required>
<button type="submit">Initiate Threat Scan</button>
</form>

<div id="scanText"></div>

{% if prediction %}
<div class="result {% if 'Phishing' in prediction %}phishing{% else %}legit{% endif %}">
{{ prediction }}
</div>
{% endif %}

</div>

</div>

<script>
function showScan(){
    document.getElementById("scanText").innerHTML =
    "<div class='scan'>Analyzing threat signatures...</div>";
}
</script>

</body>
</html>
